<ion-header [translucent]="true">
  <ion-toolbar style="--background: #b300b6; --color: white;">
    <ion-title>Cadastro</ion-title>
    <ion-back-button defaultHref="/menu" slot="start"></ion-back-button>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card>
    <ion-card-header>
      <ion-card-title>Novo Cadastro</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-label>Nome</ion-label>
      <ion-input type="text" placeholder="Digite o nome" [(ngModel)]="cadastro.nome"></ion-input>
      <ion-label>Tipo</ion-label>
      <ion-input type="text" placeholder="Cliente ou Fornecedor" [(ngModel)]="cadastro.tipo"></ion-input>
      <ion-label>Endereço</ion-label>
      <ion-input type="text" placeholder="Digite o endereço" [(ngModel)]="cadastro.endereco"></ion-input>
      <ion-button expand="block" style="--background: #b300b6; --color: white;" (click)="cadastrar()">Adicionar</ion-button>
      <ion-button expand="block" color="warning" fill="outline" (click)="limparCampos()">Limpar</ion-button>
    </ion-card-content>
  </ion-card>

  <ion-card *ngFor="let cadastro of listaCadastros; let i = index">
    <ion-card-header>
      <ion-card-title>{{ cadastro.nome }}</ion-card-title>
      <ion-card-subtitle>{{ cadastro.tipo }}</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <p><strong>Endereço:</strong> {{ cadastro.endereco }}</p>
      <ion-button fill="outline" size="small" color="danger" (click)="excluir(i)">Deletar</ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
