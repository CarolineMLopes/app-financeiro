<ion-header [translucent]="true">
  <ion-toolbar style="--background: #b300b6; --color: white;">
    <ion-title>Cadastro</ion-title>
    <ion-back-button defaultHref="/menu" slot="start"></ion-back-button>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card>
    <ion-card-header>
      <ion-card-title>Novo Cadastro</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item lines="full" class="ion-margin-bottom">
        <ion-icon name="person-outline" slot="start" style="color: #b300b6;"></ion-icon>
        <ion-input label="Usuário" label-placement="floating" type="text" placeholder="Digite seu nome" [(ngModel)]="cadastro.nome">
        </ion-input>
      </ion-item>
      <ion-label>Tipo</ion-label>
      <ion-radio-group value="custom-checked" [(ngModel)]="cadastro.tipo">
        <ion-item>
          <ion-label>Cliente</ion-label>
          <ion-radio slot="start" value="Cliente"></ion-radio>
        </ion-item>
        <ion-item>
          <ion-label>Fornecedor</ion-label>
          <ion-radio slot="start" value="Fornecedor"></ion-radio>
        </ion-item>
      </ion-radio-group> <br>
      <ion-item lines="full" class="ion-margin-bottom">
        <ion-icon name="location-outline" slot="start" style="color: #b300b6;"></ion-icon>
        <ion-input label="Endereço" label-placement="floating" type="text" placeholder="Digite seu endereço" [(ngModel)]="cadastro.endereco">
        </ion-input>
      </ion-item>
      <ion-button expand="block" style="--background: #b300b6; --color: white;" (click)="cadastrar()">Adicionar</ion-button>
      <ion-button expand="block" color="warning" fill="outline" (click)="limparCampos()">Limpar</ion-button>
    </ion-card-content> 
  </ion-card>

  <ion-card *ngFor="let cadastro of listaCadastros; let i = index">
    <ion-card-header>
      <ion-card-title>{{ cadastro.nome }}</ion-card-title>
      <ion-card-subtitle>{{ cadastro.tipo }}</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <p><strong>Endereço:</strong> {{ cadastro.endereco }}</p>
      <ion-button fill="outline" size="small" color="danger" (click)="excluir(i)">Deletar</ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
