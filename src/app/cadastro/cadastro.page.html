<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Cadastrar</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Cadastrar Pagamentos</ion-card-title>
      <ion-card-subtitle>Pagina de Cadastro</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
     <ion-item>
        <ion-label>Nome: </ion-label>
        <ion-input type="text" placeholder="Digite o nome"></ion-input>
     </ion-item>
      <ion-item>
          <ion-label>Tipo</ion-label>
          <ion-input type="text" placeholder="Cliente ou Fornecedor"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label>Endereço</ion-label>
        <ion-input type="text" placeholder="Digite o endereço"></ion-input>
      </ion-item>
       <ion-button expand="block" color="primary">Adicionar</ion-button>
       <ion-button expand="block" color="primary" (click)="abrirMenu()">Retornar</ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
