<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-card-title>MENU</ion-card-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Bem-vindo</ion-card-title>
      <ion-card-subtitle>Escolha uma opção abaixo</ion-card-subtitle>
    </ion-card-header>
  </ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Opções</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-button expand="block" (click)="abrirCadastro()">Cadastro</ion-button>
      <ion-button expand="block" (click)="abrirPagar()">Contas a Pagar</ion-button>
      <ion-button expand="block" (click)="abrirReceber()">Contas a Receber</ion-button>
    </ion-card-content>
  </ion-card>
