<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Menu</ion-title>
    <ion-back-button defaultHref="/login" slot="start"></ion-back-button>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title> Bem-vindo novamente </ion-card-title>
      <ion-card-subtitle> Escolha uma opção abaixo para navegar </ion-card-subtitle>
    </ion-card-header>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Opções</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-button expand="block" style="--background: #b300b6; --color: white;" (click)="abrirCadastro()">Cadastro</ion-button>
      <ion-button expand="block" color="danger" (click)="abrirPagar()">Contas a Pagar</ion-button>
      <ion-button expand="block" style="--background: #2da10d; --color: white;" (click)="abrirReceber()">Contas a Receber</ion-button>
    </ion-card-content>
  </ion-card>
