<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Bem-vindo</ion-card-title>
      <ion-card-subtitle> Faça login para continuar</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <ion-item lines="full" class="ion-margin-bottom">
        <ion-icon name="person-outline" slot="start" color="primary"></ion-icon>
        <ion-input label="Usuário" label-placement="floating" type="text" placeholder="Digite seu usuário">
        </ion-input>
      </ion-item>

      <ion-item lines="full" class="ion-margin-bottom">
        <ion-icon name="lock-closed-outline" slot="start" color="primary"></ion-icon>
        <ion-input label="Senha" label-placement="floating" type="password" placeholder="Digite sua senha">
        </ion-input>
      </ion-item>

      <ion-button expand="block" fill="solid" class="ion-margin-top" (click)="abrirMenu()"> Avançar
        <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
