<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card>
    <ion-card-header>
      <ion-card-title>Bem-vindo</ion-card-title>
      <ion-card-subtitle>Página de Login</ion-card-subtitle>
    </ion-card-header>
    
    <ion-card-content>
      <ion-item lines="full" class="ion-margin-bottom">
        <ion-icon name="person-circle" slot="start" color="medium"></ion-icon>
        <ion-input label="Nome" label-placement="floating" type="text" placeholder="Digite seu nome">
        </ion-input>
      </ion-item>

      <ion-item lines="full" class="ion-margin-bottom">
        <ion-icon name="key" slot="start" color="medium"></ion-icon>
        <ion-input label="Senha" label-placement="floating" type="password" placeholder="Digite sua senha">
        </ion-input>
      </ion-item>

      <div class="ion-padding">
        <ion-button expand="block" fill="solid" (click)="abrirMenu()">
          Avançar
        </ion-button>
      </div>
    </ion-card-content>
  </ion-card>
</ion-content>
